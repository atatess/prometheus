[model]
name = "/root/models/qwen3.5-4b"
lora_rank = 8
lora_alpha = 16

[training]
method = "grpo"
group_size = 4
learning_rate = 5e-6
weight_decay = 0.01
max_new_tokens = 512
time_budget_minutes = 60
warmup_steps = 10
grad_accumulation_steps = 2
max_seq_len = 2048

[curriculum]
initial_domains = ["math", "code"]
enable_verification_factory = true
frontier_band = [0.3, 0.8]
problems_per_round = 32
max_domain_saturation = 0.85
max_seed_problems = 36

[meta]
enable_domain_expansion = true
enable_autoresearch = false
benchmark_interval = 10
checkpoint_interval = 5
max_experiments = -1

[sandbox]
timeout_seconds = 30
max_memory_mb = 512
